name: git-convention
version: 1.0.0
description: Git 规范模块
type: general
depends: [core]

sections:
  - slot: git-convention
    file: snippets/git-convention.md
    order: 0

variables:
  - name: commit_lang
    prompt: "Commit message 语言"
    default: "en"
    choices: ["en", "zh"]

pre_commit_hooks:
  - file: hooks/conventional-pre-commit.yaml

commands:
  - name: commit
    file: config/commands/commit.md
