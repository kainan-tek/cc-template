name: lang-cpp
version: 1.0.0
description: C++ 开发规范模块
type: language
depends: [core]

sections:
  - slot: coding-standards
    file: snippets/coding-standards.md
    order: 100
  - slot: testing
    file: snippets/testing.md
    order: 100
    conditions:
      - when: test_framework == gtest
        file: snippets/testing.gtest.md
      - when: test_framework == catch2
        file: snippets/testing.catch2.md

variables:
  - name: test_framework
    prompt: "测试框架"
    default: "gtest"
    choices: ["gtest", "catch2"]

templates:
  - source: templates/CMakeLists.txt
    target: CMakeLists.txt
  - source: templates/clang-format
    target: .clang-format
  - source: templates/clang-tidy
    target: .clang-tidy

settings:
  file: config/settings.json.snippet

gitignore_entries:
  - "build/"
  - "cmake-build-*/"
  - "*.o"
  - "*.a"

commands:
  - name: ctest
    file: config/commands/ctest.md
