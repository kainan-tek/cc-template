name: automation
version: 1.0.0
description: 自动化模块
type: general
depends: [core]

sections:
  - slot: automation
    file: snippets/ci-github-actions.md
    order: 0
    conditions:
      - when: ci_platform == gitlab-ci
        file: snippets/ci-gitlab-ci.md

variables:
  - name: ci_platform
    prompt: "CI 平台"
    default: "github-actions"
    choices: ["github-actions", "gitlab-ci"]
  - name: INSTALL_CMD
    prompt: "依赖安装命令"
    default: "pip install -e '.[dev]'"
  - name: TEST_CMD
    prompt: "测试命令"
    default: "pytest"
  - name: CI_IMAGE
    prompt: "CI 镜像（GitLab CI 使用）"
    default: "python:3.12"

settings:
  file: config/settings.json.snippet

templates:
  - source: templates/ci.yml
    target: .github/workflows/ci.yml
    conditions:
      - when: ci_platform == gitlab-ci
        source: templates/gitlab-ci.yml
        target: .gitlab-ci.yml
